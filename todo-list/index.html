<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📝 Todo List</h1>
    
    <!-- 输入区域 -->
    <div class="input-area">
      <input type="text" id="todoInput" placeholder="输入新任务..." />
      <select id="categorySelect" class="category-select">
        <option value="work">工作</option>
        <option value="life">生活</option>
        <option value="study">学习</option>
      </select>
      <button id="addBtn">添加</button>
    </div>
    
    <!-- 分类筛选 -->
    <div class="filter-area">
      <span class="filter-label">分类：</span>
      <button class="filter-btn active" data-filter="all" data-type="category">全部</button>
      <button class="filter-btn" data-filter="work" data-type="category">工作</button>
      <button class="filter-btn" data-filter="life" data-type="category">生活</button>
      <button class="filter-btn" data-filter="study" data-type="category">学习</button>
    </div>
    
    <!-- 状态筛选 -->
    <div class="filter-area">
      <span class="filter-label">状态：</span>
      <button class="status-btn active" data-status="all">全部</button>
      <button class="status-btn" data-status="active">未完成</button>
      <button class="status-btn" data-status="completed">已完成</button>
    </div>
    
    <!-- 任务列表 -->
    <ul id="todoList" class="todo-list">
      <!-- 任务项会动态插入这里 -->
    </ul>
    
    <!-- 统计信息 -->
    <div class="stats">
      <span id="statsText">0 个任务</span>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
