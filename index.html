<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的信息卡片</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 主题切换按钮 -->
  <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
    <span class="theme-icon">🌙</span>
  </button>

  <div class="container">
    <div class="card">
      <!-- 使用 DiceBear 头像 API -->
      <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=meng&backgroundColor=b6e3f4" 
           alt="头像" 
           class="avatar" />
      <h2>meng</h2>
      <p>Java 后端 × AI 学习者</p>
      
      <!-- 展开/收起的内容 -->
      <div class="more-info" id="moreInfo">
        <p class="bio">热爱技术，追求成长。正在学习全栈开发，目标是成为能独立交付产品的开发者。</p>
        <div class="contact">
          <a href="#" class="contact-link">GitHub</a>
          <a href="#" class="contact-link">邮箱</a>
        </div>
      </div>
      
      <button class="toggle-btn" id="toggleBtn">查看更多 ↓</button>
      
      <ul class="skills">
        <li>Java</li>
        <li>Python</li>
        <li>Spring Boot</li>
        <li>正在学前端！</li>
      </ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
